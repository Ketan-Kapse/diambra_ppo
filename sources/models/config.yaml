folders:
  parent_dir: "./"
  model_name: "models"

settings:
  game_id: "doapp"
  frame_shape: !!python/tuple [128, 128, 1]
  action_space: "multi_discrete"
  characters: "Kasumi"
  difficulty: 1
  outfits: 1
  step_ratio: 3



wrappers_settings:
  normalize_reward: false
  normalization_factor: 0.3
  no_attack_buttons_combinations: false
  stack_frames: 4
  dilation: 1
  add_last_action: true
  stack_actions: 3
  scale: false
  exclude_image_scaling: true
  role_relative: true
  flatten: true
  process_discrete_binary: true
  filter_keys: ["stage", "timer", "own_character", "own_health", "own_side", "own_wins", "opp_character", "opp_health", "opp_side", "opp_wins", "frame", "action"]

policy_kwargs:
  net_arch: [{ pi: [128, 128], vf: [64, 64]}]

ppo_settings:
  gamma: 0.94
  model_checkpoint: "0"
  learning_rate: [2.5e-4, 2.5e-6]
  clip_range: [0.15, 0.025]
  batch_size: 4096 
  n_epochs: 4
  n_steps: 128
  autosave_freq: 256
  time_steps: 320000
  seed: 42

